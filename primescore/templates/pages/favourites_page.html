<section id="favouritesPage" class="page">
  <div class="container">
    <h2>Favourites</h2>

    <div class="section">
      <h3>Current favourites</h3>
      <div class="cards-grid">
        <div class="card">
          <h4>Teams</h4>
          <div id="favTeamsList"></div>
        </div>
        <div class="card">
          <h4>Players</h4>
          <div id="favPlayersList"></div>
        </div>
        <div class="card">
          <h4>Leagues</h4>
          <div id="favLeaguesList"></div>
        </div>
      </div>
    </div>

    <div class="section">
      <h3>Edit favourites</h3>
      <div class="form-group">
        <label for="favTeams">Teams (comma separated names or IDs)</label>
        <input type="text" id="favTeams" placeholder="Liverpool, Arsenal or 40, 42" />
      </div>
      <div class="form-group">
        <label for="favPlayers">Players (comma separated names with team for new players, or IDs)</label>
        <input type="text" id="favPlayers" placeholder="Mohamed Salah - Liverpool, Bukayo Saka - Arsenal or 306, 1460" />
        <p class="subtitle">Saved players can stay as plain names when you edit favourites later.</p>
      </div>
      <div class="form-group">
        <label for="favLeagues">Leagues (comma separated names or codes)</label>
        <input type="text" id="favLeagues" placeholder="Premier League, Champions League or PL, CL" />
      </div>
      <button onclick="PrimeScoreApp.saveFavourites()" class="btn-primary">Save Favourites</button>
      <p class="error-message" id="favMsg"></p>
    </div>
  </div>
</section>
